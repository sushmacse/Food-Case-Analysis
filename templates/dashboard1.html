body{

.back-btn{
    position:fixed;
    top:20px;
    left:20px;
    background:#2563eb;
    color:#fff;
    text-decoration:none;
    padding:12px 20px;
    border-radius:10px;
    font-weight:600;
    z-index:9999;
    box-shadow:0 6px 15px rgba(0,0,0,.2);
    transition:.3s;
}

.back-btn:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.tableauPlaceholder{
    width:100%;
    height:100vh;
}

.tableauViz{
    width:100%!important;
    height:100vh!important;
}
